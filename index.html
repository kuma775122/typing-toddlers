<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Toddlers</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    cursor: none;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
    font-weight: 800;
    -webkit-font-smoothing: antialiased;
  }

  #stage {
    position: fixed;
    inset: 0;
    padding: 2vh 3vw;
    display: block;
    color: #fff;
    font-size: 22.5vh;
    line-height: 1;
    white-space: normal;
    word-break: break-all;
    overflow: hidden;
  }

  .glyph {
    display: inline-block;
    opacity: 0;
    transform: translateY(-0.15em) scale(0.6);
    animation: pop 220ms cubic-bezier(.2,.9,.25,1.2) forwards,
               fade 5.625s ease-out forwards;
    margin-right: 0.02em;
    will-change: opacity, transform;
  }

  .glyph.space {
    display: inline-block;
    width: 0.35em;
  }

  @keyframes pop {
    0%   { opacity: 0; transform: translateY(-0.15em) scale(0.6); }
    60%  { opacity: 1; transform: translateY(0.02em) scale(1.08); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes fade {
    0%   { opacity: 1; }
    55%  { opacity: 1; }
    100% { opacity: 0; }
  }

  #exit {
    position: fixed;
    top: 14px;
    right: 14px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    font-family: inherit;
    transition: background 200ms, color 200ms;
  }

  #exit:hover {
    background: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
  }

  #start {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #fff;
    font-size: 5vh;
    font-weight: 700;
    cursor: pointer;
    z-index: 2000;
    text-align: center;
    padding: 20px;
  }

  #start small {
    display: block;
    margin-top: 2vh;
    font-size: 2.5vh;
    opacity: 0.5;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div id="start">
    Tap to Start
    <small>press any key to type · click ✕ to exit</small>
  </div>
  <div id="stage"></div>
  <button id="exit" aria-label="Exit">✕</button>

<script>
  const stage = document.getElementById('stage');
  const startScreen = document.getElementById('start');
  const exitBtn = document.getElementById('exit');
  let hueIndex = 0;

  function enterFullscreen() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }

  function exitFullscreen() {
    if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }

  startScreen.addEventListener('click', () => {
    enterFullscreen();
    startScreen.style.display = 'none';
  });

  exitBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    exitFullscreen();
    // clear screen and return to start
    stage.innerHTML = '';
    startScreen.style.display = 'flex';
  });

  function resetIfOverflow() {
    // If last glyph has pushed past the viewport bottom, clear and loop
    const last = stage.lastElementChild;
    if (!last) return;
    const rect = last.getBoundingClientRect();
    if (rect.bottom > window.innerHeight - 10) {
      // Fade current content quickly then clear
      Array.from(stage.children).forEach(c => {
        c.style.animation = 'none';
        c.style.transition = 'opacity 400ms ease-out';
        c.style.opacity = '0';
      });
      setTimeout(() => { stage.innerHTML = ''; }, 420);
    }
  }

  function addGlyph(char) {
    const span = document.createElement('span');
    span.className = 'glyph';
    if (char === ' ') {
      span.classList.add('space');
      span.innerHTML = '&nbsp;';
    } else {
      span.textContent = char;
    }
    // subtle per-letter delay so rapid mashes still feel individual
    span.style.animationDelay = '0ms, 0ms';
    // rainbow cycle: each letter advances the hue
    span.style.color = `hsl(${hueIndex}, 95%, 62%)`;
    hueIndex = (hueIndex + 37) % 360;
    stage.appendChild(span);

    // Remove node after its fade animation completes
    setTimeout(() => { span.remove(); }, 6250);

    resetIfOverflow();
  }

  // Keyboard input
  window.addEventListener('keydown', (e) => {
    if (startScreen.style.display !== 'none') return;

    // Ignore modifier-only / navigation keys
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    if (e.key === 'Escape') {
      exitBtn.click();
      return;
    }

    let ch = null;
    if (e.key === ' ' || e.code === 'Space') {
      ch = ' ';
      e.preventDefault();
    } else if (e.key.length === 1) {
      ch = e.key.toUpperCase();
    } else if (e.key === 'Enter') {
      // force new line by clearing overflow or adding spacer
      ch = ' ';
    }

    if (ch !== null) addGlyph(ch);
  });

  // Touch support for tablets - tap anywhere to add a random letter
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  document.addEventListener('touchstart', (e) => {
    if (startScreen.style.display !== 'none') return;
    if (e.target === exitBtn) return;
    e.preventDefault();
    for (let i = 0; i < e.touches.length; i++) {
      addGlyph(alphabet[Math.floor(Math.random() * alphabet.length)]);
    }
  }, { passive: false });
</script>
</body>
</html>
